//Sprite clas that will have all the basic methods and characteristics that tree, link, chest, and boomerang need 
class Sprite
{
	constructor(x1, y1, w1, h1, image_url)
	{
		this.x = x1
		this.y = y1
		this.w = w1
		this.h = h1
		//position variables
		this.px = x1
		this.py = y1
		//speed variable
		this.speed = 6
		this.image = new Image()
		this.image.src = image_url
		this.isValid = true

	}

	update() 
	{
		//default update -- sprite will sit still
		return this.isValid
	}
	
	//method to have sprites draw themselves
	drawYourself(g, scrollX, scrollY)
	{
		g.drawImage(this.image, this.x - scrollX, this.y - scrollY, this.w, this.h)
		
	}

	//booleans for each sprite that returns false initially
	isLink() { return false }

	isTree() { return false }

	isBoomerang() { return false }

	isTreasureChest() { return false }

}

class Tree extends Sprite
{
	constructor(x, y, w, h)
	{
		super(x, y, w, h, "images/tree.png")
	}

	//boolean that returns true for tree
	isTree()
	{
		return true
	}

	//string method to print out tree's coordinates 
	toString()
	{
		return "Tree (x,y) = (" + this.x + ", " + this.y + "), w = " + this.w + ", h = " + this.h;
	}
	
}

class Boomerang extends Sprite
{

	constructor(x, y, image_url, direction)
	{
		const BOOMERANG_WIDTH = 15
		const BOOMERANG_HEIGHT = 15
		super(x, y, BOOMERANG_WIDTH, BOOMERANG_HEIGHT, image_url)
		this.images = []
		//variables for directions, total images, index, and image frame
		this.MAX_IMAGES = 4
		this.imageFrame = 0
		this.direction = direction
		let index = 1

		//array for the boomerang images, it will increase the index and have all 4 images in the array
		for(let i = 0; i < this.MAX_IMAGES; i++)
		{
			this.images.push(new Image())
			this.images[i].src = "images/boomerang" + (index++) + ".png"

		}

	}

	//update method that handles the direction. If link is facing left, right or up and down then the boomerang will be lauched in that direction
	update()
	{
		//if direction is down
		if(this.direction === 0)
		{
			this.y += this.speed
		}
		//if direction is left
		else if(this.direction === 1)
		{
			this.x -=this.speed
		}
		//if direction is right
		if(this.direction === 2)
		{
			this.x +=this.speed
		}
		//if direction is up 
		else if(this.direction === 3)
		{
			this.y -= this.speed
		}
		
		//increasing the image frame counter
		this.imageFrame++
		//uses %4 to rotate back through images. so it goes from 0,1,2,3 boomerang images
		this.imageFrame = this.imageFrame %4
		//updates which boomerang image to show
		this.image = this.images[this.imageFrame]

		return this.isValid
	}

	//boolean method that returns true for boomerang
	isBoomerang()
	{
		return true
	}

	//changes the is valid from true to false and then I call it in the for loops in model
	//In model, the boomerang is "destroyed" and removed when it hits a tree, treasure chest or rupee
	boomerangDestroyed()
	{
		this.isValid = false;
	}

	//string method to output x,y,w.h
	toString()
	{
		return "Boomerang (x,y) = (" + this.x + ", " + this.y + "), w = " + this.w + ", h = " + this.h;
	}
	
}

class TreasureChest extends Sprite
{
	constructor(x, y)
	{
		//treasure chest height and width
		const CHEST_WIDTH = 30
		const CHEST_HEIGHT = 40
		super(x, y, CHEST_WIDTH, CHEST_HEIGHT, "images/treasurechest.png")
		//boolean for the chest when it becomes and open chest
		this.chestOpened = false
		//tracks the frames since the chest is opened and becomes a rupee
		this.framesSinceOpened = 0

		//image array for the treasure chest and rupee.
		this.images = []
		this.images[0] = new Image()
		this.images[0].src = "images/treasurechest.png"
		this.images[1] = new Image()
		this.images[1].src = "images/rupee.png"
		
	}

	//this method is for when link or boomerang collide with the chest. chest opened turns to true and it changes the image to the next image in the array which is a rupee
	treasureChestOpened()
	{
		this.chestOpened = true
		this.image = this.images[1]
		this.framesSinceOpened = 0 
		//this.isValid = false;
	}

	//update method that will increase frames if the chest is opened and then when 40 has passed, it turns this.isValid to false so it can be removed 
	//
	update()
	{
		if(this.chestOpened === true)
		{
		this.framesSinceOpened++
		}
		if(this.framesSinceOpened >= 40)
		{
			this.isValid = false
		}
		
		return this.isValid
	}

	//boolean for treasure chest
	isTreasureChest()
	{
		return true
	}

	//string method to show x,y,w,h for treasure chest
	toString()
	{
		return "treasureChest (x,y) = (" + this.x + ", " + this.y + "), w = " + this.w + ", h = " + this.h;
	}

	
}



class Link extends Sprite
{

	constructor(x, y, image_url)
	{
		//link height and width 
		const LINK_WIDTH = 50
		const LINK_HEIGHT = 60
		super(x, y, LINK_WIDTH, LINK_HEIGHT, image_url)
		//initializing the array
		this.images = []
		//variables for directions, total images, and max images in each direction
		this.MAX_IMAGES_PER_DIRECTION = 11
		this.TOTAL_NUM_IMAGES = 44
		this.NUM_DIRECTIONS = 4
		this.imageFrameNum = 0
		this.direction = 1
		this.numGemsGathered = 0
		let index = 1
		//for loop that for the array to read in the link images
		for(let i = 0; i < this.NUM_DIRECTIONS; i++){
			this.images[i] = []
			for(let j = 0; j < this.MAX_IMAGES_PER_DIRECTION; j++){
				this.images[i].push(new Image())
				this.images[i][j].src = "images/link" + (index++) + ".png"
			}
			
		}
	}

	//method that identifies the direction and speed for when link moves 
	moveSelf(dir)
	{
		if(++this.imageFrameNum >= this.MAX_IMAGES_PER_DIRECTION)
			this.imageFrameNum = 0

		if(dir === "left")
		{
			this.x -= this.speed
			this.direction = 1
		}
		else if(dir === "right")
		{
			this.x += this.speed
			this.direction = 2
		}
		if(dir === "down")
		{
			this.y += this.speed
			this.direction = 0
		}
		else if(dir === "up")
		{
			this.y -= this.speed
			this.direction = 3
		}
	}

	//update method that returns the default is valid 
	update()
	{
		return this.isValid
	}

	//collision fixing for link
	fixCollision(t)
	{
		if(this.px + this.w <= t.x && this.x + this.w >= t.x)
			this.x = t.x - this.w
		else if(this.px >= t.x + t.w && this.x < t.x + t.w)
			this.x = t.x + t.w
		if(this.py + this.h <= t.y && this.y + this.h >= t.y)
			this.y = t.y - this.h
		else if(this.py >= t.y + t.h && this.y <= t.y + t.h)
			this.y = t.y + t.h
	}

	//previous x and y method 
	savePreviousPosition()
	{
    	this.px = this.x; 
    	this.py = this.y;
	}

	//method to have sprites draw themselves
	drawYourself(g, scrollX, scrollY)
	{
		g.drawImage(this.images[this.direction][this.imageFrameNum], this.x - scrollX, this.y - scrollY, 50, 60)
		
	}

	//boolean to show that link is link
	isLink()
	{
		return true
	}

	//this increments numGemsGathered and is called in the model for loop when link collides with a rupee
	gemsGathered()
	{
		this.numGemsGathered++
	}

	//string method for link
	toString()
	{
		return "Link (x,y) = (" + this.x + ", " + this.y + "), w = " + this.w + ", h = " + this.h;
	}
}




class Model
{
	constructor()
	{
		//manually hard code the map instead of drag and drop
		//both mechanisms are provided so you can choose what works best for you
		this.sprites = [];
		//this.sprites.push(new Tree(200, 100, 68, 34, "fish.png"))
		this.link = new Link(50, 50, "images/link1.png")
		this.sprites.push(this.link) 
	}

	update()
	{
		//outer loops updates sprite and checks if still valid, if its not valid, then it removes it and doesn't check for collisons
		for(let i = 0; i < this.sprites.length; i++)
		{
			let s1 = this.sprites[i]
			if(!s1.update())
			{
				//console.log("we need to remove a sprite")
				this.sprites.splice(i,1)
				continue
			}
			//inner loop checks for and fixes collisions
			for(let j = 0; j < this.sprites.length; j++)
			{
				if(i == j)
					continue
				let s2 = this.sprites[j]
				if(this.isThereACollision(s1, s2))
				{
					//collision fixing between link and tree
					if(s1.isLink() && s2.isTree())
						this.link.fixCollision(s2)
					//collision fixing between link and treasurechest and increases the counter once a gem is gathered
					if(s1.isLink() && s2.isTreasureChest())
					{
						//this is when link collides with and unopened chest and it turns into and open chest
						if(s2.chestOpened === false)
						{
							s2.treasureChestOpened()
							//this.link.fixCollision(s2)
						}
						//this else if is for when the chest is open and checks if the frames are above 20 so then link can interact and gather the rupee
						// It's then set to false and increments the counter once link "picks it up"
						else if(s2.chestOpened === true && s2.framesSinceOpened >= 10)
						{
							s2.isValid = false
							this.link.gemsGathered()
						}
						else if(s2.chestOpened === true && s2.framesSinceOpened < 10)
						{
							//do nothing since we have to wait 10 frames before link can interact with the rupee 
						}
					}
					//collision between boomerang and tree. Once the boomerang hits a tree, it is removed
					if(s1.isBoomerang() && s2.isTree())
					{
						s1.boomerangDestroyed()
					}
					//collision between boomerang and treausre chest.
					if(s1.isBoomerang() && s2.isTreasureChest())
					{
						//this handles when boomerang collides with a chest
						//it then opens and the boomerang is destroyed
						if(s2.chestOpened === false)
						{
						s2.treasureChestOpened()
						s1.boomerangDestroyed()
						}
						//this handles when the chest is opened(rupee) and 10 frames has passed so now a second boomerang can interact with it
						// once it hits again, it increases the rupee counter and destroys the boomerang. Also removes the rupee
						else if(s2.chestOpened === true && s2.framesSinceOpened >= 10)
						{
							s2.isValid = false
							s1.boomerangDestroyed()
							this.link.gemsGathered()

						}
						//this does nothing witht rupee. Link can't pick it up with a second boomerang till 10 frames have passed
						//it just destroys the boomerang but doesn't increment the counter
						else if(s2.chestOpened === true && s2.framesSinceOpened < 10)
						{
							s1.boomerangDestroyed()
						}
			
					}
					
				}
			}
		}
	}

	//collison detection between two sprites
	isThereACollision(spriteA, spriteB)
	{
		if(spriteA.x >= spriteB.x + spriteB.w)
		{
			return false;
		}

		if(spriteA.x + spriteA.w <= spriteB.x)
		{
			return false;
		}

		if(spriteA.y >= spriteB.y + spriteB.h)
		{
			return false;
		}

		if(spriteA.y + spriteA.h <= spriteB.y)
		{
			return false;
		}
		return true;
	}

	//this adds the boomerang using link's x and y and direction
	addBoomerang()
	{
		this.sprites.push(new Boomerang(this.link.x, this.link.y, "images/boomerang1.png",this.link.direction))
	}

	//used to add treasure chest based off mouseclick
	/*addTreasureChest(x,y)
	{//do variables for game width, height and treasure chest height and width
		if(x + 50 > 1000)
			x = 1000 - 50 -1 
		if(y + 100 > 500)
			y = 500 - 100 -1
		this.sprites.push(new TreasureChest(x,y))

	} */

	//model method that calls links moving method 
	moveLink(dir)
	{
		this.link.moveSelf(dir)

	}

	//method that calls the previous position method from link
	tellLinkToSaveHerCurrentPosition()
	{
		this.link.savePreviousPosition();
	}

	
	// this reads the json file. Note that turtleX and turtleY are stored in the .json file
	// also note that f is each entry in the fishes array and f.x and f.y are the attributes of
	// each object in that array
	// if you've saved w and h in your .json, use those instead of hardcoding width and height
	// this function is called upon the event of dragging/dropping the json file onto the page
	loadMap(mapData) 
	{
		//clear the current sprites before loading from file
		this.sprites = [];

		this.link = new Link(mapData.linkX, mapData.linkY, "images/link1.png");
		this.sprites.push(this.link);

		for (let i = 0; i < mapData.trees.length; i++) {
			let f = mapData.trees[i];
			let tree = new Tree(f.x, f.y, f.w, f.h, "images/tree.png");
			this.sprites.push(tree);
		}
		for (let i = 0; i < mapData.treasurechests.length; i++) {
			let t = mapData.treasurechests[i];
			let treasurechest = new TreasureChest(t.x, t.y, "images/treasurechest.png");
			this.sprites.push(treasurechest);
		}
		
		console.log("Map loaded:", mapData);
	}
}




class View
{
	constructor(model)
	{
		this.VIEW_WIDTH = 750
		this. VIEW_HEIGHT = 500
		this.model = model
		this.canvas = document.getElementById("myCanvas")
		this.currentRoomX = 0
		this.currentRoomY = 0
	}

	update()
	{
		let ctx = this.canvas.getContext("2d")
		ctx.clearRect(0, 0, this.VIEW_WIDTH, this.VIEW_HEIGHT)
		//dark green background fill color
		ctx.fillStyle = "rgb(72, 152, 72)"
		ctx.fillRect(0, 0, this.VIEW_WIDTH, this.VIEW_HEIGHT)
		//these three lines handle the room transitions so link can move left and right
		let roomXMultiplier = Math.floor((
		this.model.link.x + this.model.link.w/2)/this.VIEW_WIDTH)
		this.currentRoomX = roomXMultiplier * this.VIEW_WIDTH

		//this handles the room transitions for link when he goes up and down
		let roomYMultiplier = Math.floor((this.model.link.y + this.model.link.h/2)/this.VIEW_HEIGHT)
		this.currentRoomY = roomYMultiplier * this.VIEW_HEIGHT

		for(let i = 0; i < this.model.sprites.length; i++)
		{
			let sprite = this.model.sprites[i]
			sprite.drawYourself(ctx, this.currentRoomX, this.currentRoomY)
			
		}

		//rupee counter that will incremenet each time link gathers a rupee. It is in the top right corner
		ctx.fillStyle = "white"
		ctx.font = " bold 20px Monaco"
		ctx.fillText("Rupee's gathered: " + this.model.link.numGemsGathered, 550, 30)
	}
}







class Controller
{
	constructor(model, view)
	{
		this.model = model
		this.view = view
		this.key_right = false
		this.key_left = false
		this.key_up = false
		this.key_down = false
		let self = this
		//view.canvas.addEventListener("click", function(event) { self.onClick(event) })
		document.addEventListener('keydown', function(event) { self.keyDown(event) }, false)
		document.addEventListener('keyup', function(event) { self.keyUp(event) }, false)
	}

	/*onClick(event)
	{
		//this.model.onclick(event.pageX - this.view.canvas.offsetLeft, event.pageY - this.view.canvas.offsetTop)
		//we should add the view.currentRoomX and y code here aswell
		this.model.addTreasureChest(event.pageX - this.view.canvas.offsetLeft, event.pageY - this.view.canvas.offsetTop)

	} */

	keyDown(event)
	{
		if(event.keyCode == 39) 
			this.key_right = true
		else if(event.keyCode == 37) 
			this.key_left = true
		else if(event.keyCode == 38) 
			this.key_up = true
		else if(event.keyCode == 40) 
			this.key_down = true
	}

	keyUp(event)
	{
		if(event.keyCode == 39) 
			this.key_right = false
		else if(event.keyCode == 37) 
			this.key_left = false
		else if(event.keyCode == 38) 
			this.key_up = false
		else if(event.keyCode == 40) 
			this.key_down = false
		//space bar 
		else if(event.keyCode == 32)
			this.model.addBoomerang()
	}

	update()
	{
		this.model.tellLinkToSaveHerCurrentPosition();
		if(this.key_right) 
			this.model.moveLink("right")
		else if(this.key_left)
			this.model.moveLink("left")
		if(this.key_up) 
			this.model.moveLink("up");
		else if(this.key_down) 
			this.model.moveLink("down");
		
	}
}





class Game
{
	constructor()
	{
		this.model = new Model();
		this.view = new View(this.model);
		this.controller = new Controller(this.model, this.view);
	
		//this code will allow you to drag and drop your map instead of hardcoding it!
		//do not change this code
		var dropZone = document.getElementById("dropZone");
		var self = this;

		// Prevent default drag behaviors
		["dragenter", "dragover", "dragleave", "drop"].forEach(function(eventName) {
		  dropZone.addEventListener(eventName, function(e) { e.preventDefault(); e.stopPropagation(); });
		});

		// Highlight drop zone when dragging over
		["dragenter", "dragover"].forEach(function(eventName) {
		  dropZone.addEventListener(eventName, function() { dropZone.classList.add("hover"); });
		});

		["dragleave", "drop"].forEach(function(eventName) {
		  dropZone.addEventListener(eventName, function() { dropZone.classList.remove("hover"); });
		});

		// Handle dropped files
		dropZone.addEventListener("drop", function(e) {
			var file = e.dataTransfer.files[0];
			if (!file) return;
			if (!file.name.endsWith(".json")) {
				alert("Please drop your map JSON file here.");
				return;
			}

			var reader = new FileReader();
			reader.onload = function(ev) {
				try {
					var data = JSON.parse(ev.target.result);
					self.model.loadMap(data);
				} catch(err) {
					alert("Error parsing JSON: " + err.message);
				}
			};
			reader.readAsText(file);
		});
	}

	onTimer()
	{
		this.controller.update();
		this.model.update();
		this.view.update();
	}
}

let game = new Game()
let timer = setInterval(function() { game.onTimer() }, 50)
